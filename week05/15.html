<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>15 Puzzle</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
      font-family: sans-serif;
    }

    .controls {
      width: 330px;
      display: flex;
      flex-direction: column;
      gap: 5px; 
      margin-bottom: 10px;
    }

    .btn-group {
      display: flex;
      justify-content: flex-start;
    }

    .btn-group button {
      padding: 5px 12px;
      margin-right: 4px;
      background: #fdfdfd;
      border: 1px solid #999;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-group .solve-btn {
      color: #ccc; 
      background: #f5f5f5;
    }

    .move-status {
      display: flex;
      align-items: center;
      justify-content: flex-end; 
      gap: 10px;
      font-size: 15px;
      font-weight: bold;
    }

    .move-count-box {
      border: 1px solid #999;
      padding: 2px 10px;
      min-width: 60px;
      text-align: right;
      background: white;
    }

    .puzzle-board {
      background-color: yellow; 
      padding: 8px;
      border: 1px solid #aaa;
    }

    .puzzle-container {
      display: grid;
      grid-template-columns: repeat(4, 75px);
      grid-template-rows: repeat(4, 75px);
      gap: 8px;
    }

    .puzzle-piece {
      width: 75px;
      height: 75px;
      border: 1px solid #000;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
      background-color: lightblue;
      font-weight: bold;
    }

    .puzzle-piece.empty {
      background-color: lightblue; 
      cursor: default;
    }
  </style>
</head>
<body>

  <div class="controls">
    <div class="btn-group">
      <button id="shuffleBtn">SHUFFLE</button>
      <button>UNDO</button>
      <button>REDO</button>
      <button class="solve-btn">SOLVE</button>
    </div>
    <div class="move-status">
      <span>이동횟수</span>
      <div class="move-count-box" id="moveCount">0</div>
    </div>
  </div>

  <div class="puzzle-board">
    <div class="puzzle-container" id="puzzleContainer"></div>
  </div>

  <script>
    const puzzleContainer = document.getElementById('puzzleContainer');
    const moveCountDisplay = document.getElementById('moveCount');
    const size = 4;
    let numbers = [7, 6, 4, 0, 12, 1, 11, 10, 15, 2, 14, 13, 9, 5, 3, 8];
    let moveCount = 0; 

 
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      shuffle(numbers);
      moveCount = 0; 
      refreshPuzzle();
    });

    function createPuzzle() {
      refreshPuzzle();
    }

    function movePiece(index) {
      const emptyIndex = numbers.indexOf(0);
      if (index === emptyIndex) return;
      
      const rowDiff = Math.abs(Math.floor(emptyIndex / size) - Math.floor(index / size));
      const colDiff = Math.abs((emptyIndex % size) - (index % size));
      
      if (rowDiff + colDiff !== 1) return;

      [numbers[emptyIndex], numbers[index]] = [numbers[index], numbers[emptyIndex]];
      
      moveCount++;  
      refreshPuzzle();
    }

    function refreshPuzzle() {
      puzzleContainer.innerHTML = '';
      moveCountDisplay.textContent = moveCount; 
      
      numbers.forEach((number, index) => {
        const piece = document.createElement('div');
        piece.classList.add('puzzle-piece');
        
        if (number === 0) {
          piece.classList.add('empty');
          piece.textContent = '';
        } else {
          piece.textContent = number;
        }

        piece.addEventListener('click', () => movePiece(index));
        puzzleContainer.appendChild(piece);
      });

      if (isSolved() && moveCount > 0) {
        setTimeout(() => alert('Congratulations!'), 100);
      }
    }

    function isSolved() {
      
      for (let i = 0; i < numbers.length - 1; i++) {
        if (numbers[i] !== i + 1) return false;
      }
      return numbers[numbers.length - 1] === 0;
    }

    createPuzzle();
  </script>
</body>
</html>
